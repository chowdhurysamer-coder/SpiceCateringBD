<svg xmlns="http://w3.org" viewBox="0 0 1000 625" width="100%" height="100%">
  <!-- Background -->
  <rect width="1000" height="625" fill="#E6E6E6"/>

  <!-- Steaming Vapor (Gray Lines) -->
  <g fill="none" stroke="#A6A6A6" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer/Right stream loop -->
    <path d="M 645,248 
             C 660,230, 675,200, 665,175 
             C 655,150, 615,145, 600,170 
             C 585,195, 620,230, 635,255
             C 650,280, 640,310, 630,325 
             C 625,332, 620,338, 615,342" />
    
    <!-- Inner/Left stream loop -->
