             C 480,172, 490,170, 500,170 
             C 510,170, 520,172, 520,185 
             C 520,193, 512,195, 508,198 
             L 508,205 
             L 492,205 
             L 492,198 
             C 488,195, 480,193, 480,185 Z" />
    
    <!-- Dome body -->
