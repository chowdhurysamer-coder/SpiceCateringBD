    <path d="M 390,349 
             C 400,349, 415,355, 428,375 
             C 445,402, 480,410, 495,375 
             C 502,358, 505,350, 512,349 
             C 518,349, 520,358, 522,370 
             C 525,385, 532,410, 555,420 
             C 572,427, 580,410, 582,395 
             C 585,375, 582,360, 588,349 
             C 592,349, 595,355, 598,368 
             C 605,395, 600,430, 595,465 
             C 593,478, 585,490, 585,490 
             C 585,490, 580,480, 582,465 
             C 585,440, 590,415, 582,398 
             C 575,415, 565,432, 545,432 
             C 520,432, 512,410, 508,390 
             C 500,415, 480,440, 465,465 
             C 450,490, 435,510, 432,530 
             C 432,530, 428,515, 432,495 
             C 438,470, 455,445, 470,415 
             C 455,420, 440,415, 428,398 
             C 415,380, 402,365, 390,361 
